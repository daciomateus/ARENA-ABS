<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena ABS | Area Admin</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="checkout-body">
  <main class="checkout-shell">
    <section class="checkout-card">
      <div class="checkout-header">
        <div>
          <span class="eyebrow eyebrow--light">Admin</span>
          <h1>Area administrativa</h1>
          <p>Somente o dono da arena deve usar esta tela para consultar e cancelar reservas.</p>
        </div>
        <a class="ghost-button" href="./index.html">Voltar para agenda</a>
      </div>

      <div class="checkout-layout checkout-layout--stacked">
        <section id="admin-auth-card">
          <h2 class="checkout-subtitle">Entrar</h2>
          <form id="admin-login-form" class="checkout-form">
            <label class="form-field">
              <span>Senha do admin</span>
              <input type="password" id="admin-password" required />
            </label>
            <button class="primary-button" type="submit">Acessar reservas</button>
          </form>
          <p id="admin-message" class="form-message"></p>
        </section>

        <section id="admin-panel" class="hidden">
          <div class="checkout-header checkout-header--compact">
            <div>
              <h2 class="checkout-subtitle">Reservas ativas</h2>
              <p>Voce pode cancelar qualquer horario por aqui.</p>
            </div>
            <button id="admin-logout" class="ghost-button" type="button">Sair</button>
          </div>
          <div id="admin-reservation-list" class="checkout-selection-list"></div>
        </section>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script src="./admin.js"></script>
</body>
</html>
